services:
  rust-server:
    build: .
    platform: linux/amd64
    container_name: rust-server
    restart: unless-stopped
    ports:
      - "${RUST_SERVER_PORT:-28015}:${RUST_SERVER_PORT:-28015}/udp"
      - "${RUST_SERVER_PORT:-28015}:${RUST_SERVER_PORT:-28015}/tcp"
      - "${RUST_RCON_PORT:-28016}:${RUST_RCON_PORT:-28016}/tcp"
      - "${RUST_SERVER_QUERYPORT:-28016}:${RUST_SERVER_QUERYPORT:-28016}/udp"
      - "${RUST_APP_PORT:-28082}:${RUST_APP_PORT:-28082}/tcp"
    env_file: .env
    volumes:
      - rust-data:/rust
      - ./plugins:/plugins:ro
      - ./cfg:/cfg:ro
    stdin_open: true
    tty: true

  web-admin:
    build: ./web
    container_name: rust-web-admin
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:${WEB_PORT:-3000}"
    env_file: .env
    environment:
      - RUST_CONTAINER_NAME=rust-server
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./cfg:/cfg
      - rust-data:/rust-data
    depends_on:
      - rust-server

volumes:
  rust-data:
